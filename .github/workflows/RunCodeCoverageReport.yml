name: Code Coverage Report
on:
  # following runs Code Coverage only on PRs or manually (maybe?)
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  run-code-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Ensures the versioning extension can see tags/history

      - name: Set up JDK 25
        uses: actions/setup-java@v5.1.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Code Coverage
        run: mvn -B verify

      - name: Add Coverage to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          # custom thresholds
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          # update same comment in PR
          title: "FDU Wordle Prep Code Coverage"
          update-comment: true

      - name: Upload Full Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/